services:
  postgres:
    image: postgres:16-alpine
    container_name: shared-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: klevar-shared-pg-2026
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - shared-internal
      - traefik-public
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M

  redis:
    image: redis:7-alpine
    container_name: shared-redis
    restart: unless-stopped
    command: redis-server --maxmemory 32mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - shared-internal
      - traefik-public
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 48M

volumes:
  pg_data:
  redis_data:

networks:
  shared-internal:
    driver: bridge
  traefik-public:
    external: true
