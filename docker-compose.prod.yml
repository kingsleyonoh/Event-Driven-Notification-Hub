services:
  app:
    image: ghcr.io/kingsleyonoh/notification-hub:latest
    container_name: notification-hub
    restart: unless-stopped
    env_file: .env
    deploy:
      resources:
        limits:
          memory: 128M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notification-hub.rule=Host(`notify.kingsleyonoh.com`)"
      - "traefik.http.routers.notification-hub.tls.certresolver=letsencrypt"
      - "traefik.http.services.notification-hub.loadbalancer.server.port=3847"
    networks:
      - traefik-public
      - shared-services_shared-internal

networks:
  traefik-public:
    external: true
  shared-services_shared-internal:
    external: true
